name: local_first_notes
description: Local-first notes data layer (Drift + SQLite FTS5) for benchmark comparison.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.29.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5
  collection: ^1.18.0
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.29.0
  build_runner: ^2.10.4
  path: ^1.9.1

flutter:
  uses-material-design: true
